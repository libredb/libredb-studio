version: "1"

connections:
  - id: "env-var-creds"
    name: "Env Var Creds"
    type: postgres
    host: pg.internal
    password: "${GOOD_PASSWORD}"
    roles: ["*"]

  - id: "plaintext-creds"
    name: "Plaintext Creds"
    type: mysql
    host: mysql.internal
    password: "hardcoded_secret"
    roles: ["*"]

  - id: "missing-env"
    name: "Missing Env"
    type: postgres
    host: pg.internal
    password: "${NONEXISTENT_VAR}"
    roles: ["*"]
