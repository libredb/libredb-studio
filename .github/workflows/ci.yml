name: CI

on:
  push:
    branches:
      - ci
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-build:
    name: Lint, Typecheck and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Build project
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          JWT_SECRET: test-secret-for-ci-build-only-32ch
          ADMIN_EMAIL: admin@libredb.org
          ADMIN_PASSWORD: test-admin
          USER_EMAIL: user@libredb.org
          USER_PASSWORD: test-user

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run merged test coverage (core + components)
        run: bun run test:coverage
        env:
          JWT_SECRET: test-secret-for-ci-build-only-32ch
          ADMIN_EMAIL: admin@libredb.org
          ADMIN_PASSWORD: test-admin
          USER_EMAIL: user@libredb.org
          USER_PASSWORD: test-user

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  e2e:
    name: E2E Tests
    needs: [lint-and-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx playwright test
        env:
          JWT_SECRET: test-secret-for-ci-build-only-32ch
          ADMIN_EMAIL: admin@libredb.org
          ADMIN_PASSWORD: test-admin
          USER_EMAIL: user@libredb.org
          USER_PASSWORD: test-user
          DEMO_DB_ENABLED: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build chart dependencies
        run: helm dependency build charts/libredb-studio

      - name: Lint Helm chart
        run: helm lint charts/libredb-studio --strict

      - name: Verify appVersion matches package.json
        run: |
          APP_VERSION=$(node -e "console.log(require('./package.json').version)")
          CHART_VERSION=$(grep '^appVersion:' charts/libredb-studio/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ "$APP_VERSION" != "$CHART_VERSION" ]; then
            echo "ERROR: Chart appVersion ($CHART_VERSION) does not match package.json ($APP_VERSION)"
            exit 1
          fi
          echo "OK: appVersion=$CHART_VERSION matches package.json"

  sonarcloud:
    name: SonarCloud Analysis
    needs: [test]
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Verify coverage file
        run: |
          echo "=== Coverage file check ==="
          ls -la coverage/
          echo "=== First 5 SF lines ==="
          grep "^SF:" coverage/lcov.info | head -5
          echo "=== Record count ==="
          grep -c "^SF:" coverage/lcov.info
          echo "=== Sample record ==="
          head -20 coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
